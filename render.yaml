services:
  - type: web
    name: chess-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://your-frontend-url.onrender.com  # Update this after deploying frontend
      - key: PORT
        value: 10000
    healthCheckPath: /health
